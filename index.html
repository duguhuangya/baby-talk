<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FF6B6B" />
    <meta name="description" content="咿呀学语 - AI互动早教平台，为1.5-3岁宝宝设计的智能早教应用" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>咿呀学语 - AI互动早教</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; }
      body { 
        font-family: 'Quicksand', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
        background: #FFF9F0;
      }
      
      /* Loading screen */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #FFF9F0 0%, #FFE4D6 50%, #FFD6BA 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      .app-loading.hidden {
        opacity: 0;
        visibility: hidden;
      }
      
      .loading-baby {
        font-size: 80px;
        animation: bounce 1s ease-in-out infinite;
      }
      
      .loading-text {
        margin-top: 20px;
        font-size: 24px;
        font-weight: 700;
        color: #FF6B6B;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      .loading-dots {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      
      .loading-dot {
        width: 12px;
        height: 12px;
        background: #FF6B6B;
        border-radius: 50%;
        animation: bounce 0.6s ease-in-out infinite;
      }
      
      .loading-dot:nth-child(2) { animation-delay: 0.1s; }
      .loading-dot:nth-child(3) { animation-delay: 0.2s; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <div class="loading-baby">👶</div>
        <div class="loading-text">咿呀学语</div>
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.querySelector('.app-loading');
          if (loader) loader.classList.add('hidden');
        }, 800);
      });
    </script>
  </body>
</html>
