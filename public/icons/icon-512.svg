<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGradient512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient512)" filter="url(#shadow512)"/>
  
  <!-- Face Background -->
  <circle cx="256" cy="270" r="180" fill="#FFF5EB"/>
  
  <!-- Eyes -->
  <ellipse cx="196" cy="255" rx="30" ry="36" fill="#333333"/>
  <ellipse cx="316" cy="255" rx="30" ry="36" fill="#333333"/>
  <ellipse cx="205" cy="245" rx="12" ry="14" fill="#FFFFFF"/>
  <ellipse cx="325" cy="245" rx="12" ry="14" fill="#FFFFFF"/>
  
  <!-- Rosy Cheeks -->
  <ellipse cx="145" cy="290" rx="28" ry="20" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="367" cy="290" rx="28" ry="20" fill="#FFB6C1" opacity="0.5"/>
  
  <!-- Smile -->
  <path d="M 206 310 Q 256 380 306 310" stroke="#333333" stroke-width="10" stroke-linecap="round" fill="none"/>
  
  <!-- Speech Bubble -->
  <path d="M 340 100 L 460 100 L 460 240 L 380 240 L 355 295 L 370 240 L 340 240 Z" fill="url(#yellowGradient512)" stroke="#FFD700" stroke-width="4"/>
  
  <!-- Stars in Bubble -->
  <text x="365" y="140" font-size="36" fill="#FF6B6B">⭐</text>
  <text x="395" y="180" font-size="28" fill="#4ECDC4">✨</text>
  <text x="370" y="210" font-size="24" fill="#96CEB4">🌟</text>
  
  <!-- Top Decoration -->
  <circle cx="256" cy="85" r="20" fill="#FFE66D"/>
  <path d="M 235 85 L 256 65 L 277 85" stroke="#FFE66D" stroke-width="8" stroke-linecap="round" fill="none"/>
  
  <!-- Decorative Stars -->
  <text x="60" y="150" font-size="40" fill="#FFE66D" opacity="0.8">✨</text>
  <text x="420" y="350" font-size="35" fill="#FFE66D" opacity="0.8">✨</text>
  <text x="70" y="380" font-size="30" fill="#4ECDC4" opacity="0.6">⭐</text>
</svg>