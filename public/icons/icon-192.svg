<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="96" cy="96" r="90" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Face Background -->
  <circle cx="96" cy="100" r="70" fill="#FFF5EB"/>
  
  <!-- Eyes -->
  <ellipse cx="72" cy="95" rx="12" ry="14" fill="#333333"/>
  <ellipse cx="120" cy="95" rx="12" ry="14" fill="#333333"/>
  <ellipse cx="75" cy="92" rx="5" ry="6" fill="#FFFFFF"/>
  <ellipse cx="123" cy="92" rx="5" ry="6" fill="#FFFFFF"/>
  
  <!-- Rosy Cheeks -->
  <ellipse cx="55" cy="108" rx="12" ry="8" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="137" cy="108" rx="12" ry="8" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Smile -->
  <path d="M 76 115 Q 96 140 116 115" stroke="#333333" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Speech Bubble -->
  <path d="M 130 45 L 165 45 L 165 85 L 145 85 L 135 100 L 140 85 L 130 85 Z" fill="url(#yellowGradient)" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Stars in Bubble -->
  <text x="138" y="58" font-size="14" fill="#FF6B6B">⭐</text>
  <text x="150" y="72" font-size="12" fill="#4ECDC4">✨</text>
  
  <!-- Top Decoration -->
  <circle cx="96" cy="35" r="8" fill="#FFE66D"/>
  <path d="M 88 35 L 96 28 L 104 35" stroke="#FFE66D" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>